<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аптечка тревоги — тренажёр техник</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --bg2: #EDE6D6;
    --bg3: #E3D9C6;
    --ink: #2C2416;
    --ink2: #6B5E48;
    --ink3: #9B8C74;
    --accent: #7B5C3E;
    --accent-light: #C4A882;
    --accent-pale: #F0E8D8;
    --green-light: #D6E8D2;
    --border: rgba(107,94,72,0.2);
    --radius: 16px;
    --radius-sm: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    min-height: 100vh;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 0; opacity: 0.5;
  }
  .wrap { max-width: 480px; margin: 0 auto; padding: 28px 20px 60px; position: relative; z-index: 1; }

  .site-header { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
  .logo-mark {
    width: 34px; height: 34px; background: var(--accent); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 16px; height: 16px; }
  .logo-text { font-family: 'Lora', serif; font-size: 14px; color: var(--ink2); letter-spacing: 0.02em; }

  .screen { display: none; animation: fadeUp 0.3s ease both; }
  .screen.active { display: block; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

  .display { font-family: 'Lora', serif; font-size: 26px; line-height: 1.25; color: var(--ink); margin-bottom: 8px; }
  .display em { font-style: italic; color: var(--accent); }
  .lead { font-size: 14px; color: var(--ink2); line-height: 1.65; margin-bottom: 24px; }
  .pill { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; background: var(--accent-pale); color: var(--accent); margin-bottom: 14px; border: 1px solid var(--border); }

  /* technique cards */
  .technique-card {
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin-bottom: 10px;
    cursor: pointer; transition: all 0.18s;
  }
  .technique-card:hover { border-color: var(--accent); background: var(--accent-pale); transform: translateY(-1px); }
  .tc-top { display: flex; align-items: flex-start; gap: 13px; }
  .tc-icon {
    width: 42px; height: 42px; border-radius: 10px;
    background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .tc-body { flex: 1; }
  .tc-when { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--accent); margin-bottom: 3px; }
  .tc-name { font-family: 'Lora', serif; font-size: 16px; color: var(--ink); margin-bottom: 3px; }
  .tc-desc { font-size: 13px; color: var(--ink2); line-height: 1.5; }
  .tc-meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .tc-tag { font-size: 11px; color: var(--ink3); background: var(--bg3); border: 1px solid var(--border); padding: 3px 9px; border-radius: 20px; }

  /* do screen */
  .tech-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .tech-header-icon { font-size: 22px; }
  .tech-header-name { font-family: 'Lora', serif; font-size: 18px; color: var(--ink); }

  /* big timer */
  .timer-big {
    text-align: center; margin: 0 0 24px;
    position: relative;
  }
  .timer-svg-wrap { display: inline-block; position: relative; width: 160px; height: 160px; }
  .timer-face {
    width: 160px; height: 160px; border-radius: 50%;
    background: var(--bg2); border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center; flex-direction: column;
    position: relative; z-index: 1;
  }
  .timer-svg-wrap svg { position: absolute; top: 0; left: 0; z-index: 2; pointer-events: none; }
  .timer-num { font-family: 'Lora', serif; font-size: 48px; color: var(--ink); line-height: 1; }
  .timer-unit { font-size: 13px; color: var(--ink3); margin-top: 2px; }

  /* step info below timer */
  .step-info {
    background: var(--bg2); border: 1.5px solid var(--border);
    border-radius: var(--radius); padding: 20px 20px;
    margin-bottom: 16px; min-height: 100px;
    transition: all 0.25s;
  }
  .step-eyebrow { font-size: 11px; color: var(--ink3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
  .step-text { font-size: 17px; color: var(--ink); line-height: 1.65; font-family: 'Lora', serif; }
  .step-note { font-size: 13px; color: var(--ink2); margin-top: 10px; line-height: 1.55; padding-top: 10px; border-top: 1px solid var(--border); }

  /* cycle counter */
  .cycle-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 18px; }
  .cycle-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--bg3); border: 1.5px solid var(--border); transition: all 0.3s; }
  .cycle-dot.done { background: var(--accent); border-color: var(--accent); }
  .cycle-dot.active { background: var(--accent-light); border-color: var(--accent-light); transform: scale(1.2); }

  /* step progress bar */
  .step-bar { display: flex; gap: 5px; margin-bottom: 18px; }
  .step-pip { height: 3px; border-radius: 2px; flex: 1; background: var(--bg3); transition: background 0.3s; }
  .step-pip.done { background: var(--accent); }
  .step-pip.active { background: var(--accent-light); }

  .btn-main {
    width: 100%; padding: 14px; background: var(--accent); color: #FBF6EE;
    border: none; border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 400;
    cursor: pointer; transition: all 0.18s; margin-bottom: 8px; letter-spacing: 0.01em;
  }
  .btn-main:hover { background: #5C4230; }
  .btn-ghost {
    width: 100%; padding: 12px; background: transparent; color: var(--ink2);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.18s; margin-bottom: 8px;
  }
  .btn-ghost:hover { border-color: var(--accent-light); background: var(--accent-pale); }

  /* finish */
  .finish-badge {
    width: 60px; height: 60px; background: var(--green-light); border-radius: 50%;
    margin: 0 auto 18px; display: flex; align-items: center; justify-content: center;
    font-size: 26px; border: 1px solid rgba(74,103,65,0.2);
  }
  .finish-title { font-family: 'Lora', serif; font-size: 24px; text-align: center; margin-bottom: 8px; }
  .finish-sub { font-size: 14px; color: var(--ink2); text-align: center; line-height: 1.65; margin-bottom: 22px; }
  .feeling-row { display: flex; gap: 8px; margin-bottom: 20px; }
  .feeling-btn {
    flex: 1; padding: 12px 6px; background: var(--bg2);
    border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    text-align: center; cursor: pointer; font-size: 12px; color: var(--ink2); transition: all 0.18s;
  }
  .feeling-btn:hover, .feeling-btn.selected { border-color: var(--accent); background: var(--accent-pale); color: var(--accent); }
  .feeling-icon { font-size: 20px; display: block; margin-bottom: 4px; }
  .advice-block {
    background: var(--bg3); border-left: 3px solid var(--accent-light);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    padding: 12px 14px; font-size: 13px; color: var(--ink2); line-height: 1.6; margin-bottom: 20px;
  }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  /* transition animation for step card */
  .step-info.fade-out { opacity: 0; transform: translateY(6px); }
  .step-info { transition: opacity 0.2s, transform 0.2s; }
</style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="logo-mark">
      <svg viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7" stroke="#FBF6EE" stroke-width="1.5"/>
        <path d="M9 5v4l2.5 2.5" stroke="#FBF6EE" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <span class="logo-text">Тревога в кармане</span>
  </header>

  <!-- SCREEN 1: выбор техники -->
  <div class="screen active" id="screen-pick">
    <div class="pill">Тренажёр техник</div>
    <h1 class="display">Что <em>попробуем</em> сейчас?</h1>
    <p class="lead">Выбери технику — и просто следуй инструкции. Всё остальное сделает тренажёр.</p>
    <div id="technique-list"></div>
  </div>

  <!-- SCREEN 2: выполнение -->
  <div class="screen" id="screen-do">
    <div class="tech-header">
      <span class="tech-header-icon" id="do-icon"></span>
      <span class="tech-header-name" id="do-name"></span>
    </div>
    <div class="step-bar" id="step-bar"></div>

    <div class="timer-big" id="timer-big" style="display:none">
      <div class="timer-svg-wrap">
        <div class="timer-face">
          <span class="timer-num" id="timer-num">0</span>
          <span class="timer-unit" id="timer-unit">сек</span>
        </div>
        <svg width="160" height="160" id="timer-svg">
          <circle cx="80" cy="80" r="76" fill="none" stroke="#C4A882" stroke-width="3"
            stroke-dasharray="477.5" stroke-dashoffset="477.5"
            stroke-linecap="round" id="timer-arc"
            transform="rotate(-90 80 80)"/>
        </svg>
      </div>
    </div>

    <div class="cycle-row" id="cycle-row" style="display:none"></div>

    <div class="step-info" id="step-info">
      <div class="step-eyebrow" id="step-eyebrow"></div>
      <div class="step-text" id="step-text"></div>
      <div class="step-note" id="step-note" style="display:none"></div>
    </div>

    <button class="btn-main" id="btn-start">Начать практику →</button>
    <button class="btn-ghost" id="btn-stop" style="display:none">Остановить</button>
    <button class="btn-ghost" id="btn-back-pick">← Выбрать другую технику</button>
  </div>

  <!-- SCREEN 3: финиш -->
  <div class="screen" id="screen-finish">
    <div class="finish-badge">✦</div>
    <h2 class="finish-title">Сделано</h2>
    <p class="finish-sub" id="finish-text"></p>
    <p class="label">Как стало?</p>
    <div class="feeling-row">
      <div class="feeling-btn" data-v="better"><span class="feeling-icon">☀︎</span>Лучше</div>
      <div class="feeling-btn" data-v="same"><span class="feeling-icon">◌</span>Так же</div>
      <div class="feeling-btn" data-v="worse"><span class="feeling-icon">↓</span>Хуже</div>
    </div>
    <div class="advice-block" id="finish-advice" style="display:none"></div>
    <hr class="divider">
    <button class="btn-main" id="btn-another">Попробовать другую технику</button>
    <button class="btn-ghost" id="btn-repeat">Повторить эту же</button>
  </div>
</div>

<script>
// ── Techniques ──
// Each step has: text, note?, timer? (seconds), cycles? (repeat N times with sub-steps)
// cycles: { count, phases: [{label, duration}] }
const TECHNIQUES = [
  {
    id: 'vzdoh', icon: '💨',
    when: 'Острая тревога · прямо сейчас',
    name: 'Физиологический вздох',
    desc: 'Самая быстрая техника. Двойной вдох через нос за 2–3 минуты снижает пульс.',
    tags: ['2–3 мин', 'дыхание', 'можно незаметно'],
    steps: [
      { text: 'Сядь или встань удобно. Плечи расслаблены, спина свободна.', timer: 5 },
      { text: 'Короткий вдох через нос — и сразу ещё один вдох сверху, не выдыхая.', note: 'Как будто «доснифываешь» воздух. Лёгкие раздуваются чуть сильнее.', timer: 4 },
      { text: 'Медленный долгий выдох через рот — полностью опустоши лёгкие.', timer: 8 },
      { text: 'Повторяем цикл — двойной вдох и долгий выдох.', note: 'Просто следи за счётчиком — тренажёр сам ведёт тебя.', cycles: { count: 4, phases: [
        { label: 'Двойной вдох', duration: 4 },
        { label: 'Долгий выдох', duration: 8 },
      ]}},
      { text: 'Останови внимание на теле. Где стало мягче?', note: 'Нет правильного ответа. Просто замечай.', timer: 15 },
    ]
  },
  {
    id: 'square', icon: '⬜',
    when: 'Напряжение, надо собраться',
    name: 'Квадратное дыхание',
    desc: 'Ритм 4-4-4-4 перезапускает нервную систему. Хорошо перед важным разговором или экзаменом.',
    tags: ['5 мин', 'дыхание', 'ритм'],
    steps: [
      { text: 'Прими удобную позу. Можно закрыть глаза.', timer: 5 },
      { text: 'Сейчас пройдём 6 циклов дыхания 4-4-4-4. Просто следи за экраном.', timer: 4 },
      { text: 'Дышим по квадрату — вдох, задержка, выдох, пауза.', cycles: { count: 6, phases: [
        { label: 'Вдох', duration: 4 },
        { label: 'Задержка', duration: 4 },
        { label: 'Выдох', duration: 4 },
        { label: 'Пауза', duration: 4 },
      ]}},
      { text: 'Дыши свободно. Почувствуй разницу.', timer: 15 },
    ]
  },
  {
    id: '478', icon: '🌊',
    when: 'Фоновая тревога, трудно заснуть',
    name: 'Дыхание 4-7-8',
    desc: 'Длинный выдох активирует парасимпатику сильнее всего. Хорошо перед сном.',
    tags: ['5 мин', 'дыхание', 'для сна'],
    steps: [
      { text: 'Сядь ровно или ляг. Руки на животе — чувствуй дыхание.', timer: 6 },
      { text: 'Пройдём 4 цикла дыхания 4-7-8. Самое важное — длинный выдох.', timer: 4 },
      { text: 'Дышим по схеме 4-7-8.', note: 'Если кружится голова — это нормально при первом разе.', cycles: { count: 4, phases: [
        { label: 'Вдох', duration: 4 },
        { label: 'Задержка', duration: 7 },
        { label: 'Выдох', duration: 8 },
      ]}},
      { text: 'Дыши свободно. Замечай, как тело стало тяжелее.', timer: 15 },
    ]
  },
  {
    id: '54321', icon: '✋',
    when: 'Паника, мысли улетают',
    name: 'Техника 5-4-3-2-1',
    desc: 'Сенсорное заземление. Возвращает тебя в здесь и сейчас.',
    tags: ['5–7 мин', 'заземление', 'без таймера'],
    steps: [
      { text: 'Оглядись. Назови про себя 5 предметов, которые видишь прямо сейчас.', note: 'Стол, окно, чашка, телефон, лампа. Без оценок — просто перечисляй.', timer: 20 },
      { text: 'Назови 4 вещи, которые можешь потрогать. Потрогай их — почувствуй текстуру.', note: 'Одежда, стул, ладони, стена — всё подходит.', timer: 20 },
      { text: 'Прислушайся. Назови 3 звука, которые слышишь прямо сейчас.', note: 'Фон, техника, голоса — замечай всё.', timer: 20 },
      { text: 'Найди 2 запаха рядом. Или просто сделай глубокий вдох и почувствуй воздух.', timer: 15 },
      { text: 'Найди 1 вкус во рту или выпей глоток воды — медленно, замечая каждое ощущение.', note: 'Ты вернулся в тело.', timer: 15 },
    ]
  },
  {
    id: 'scan', icon: '🧘',
    when: 'Напряжение в теле, усталость',
    name: 'Сканирование тела',
    desc: 'Медленное путешествие вниманием от макушки до стоп. Снимает зажатость.',
    tags: ['10 мин', 'тело', 'лучше лёжа'],
    steps: [
      { text: 'Ляг или сядь удобно. Закрой глаза. Сделай 3 медленных выдоха.', timer: 15 },
      { text: 'Направь внимание на макушку. Есть напряжение? Тепло? Покалывание?', note: 'Не нужно ничего менять — просто замечай.', timer: 30 },
      { text: 'Медленно опускайся вниз — лицо, шея, плечи. Где зажатость?', note: 'Представь: с каждым выдохом напряжение чуть растворяется.', timer: 40 },
      { text: 'Грудь, живот, спина. Как дышит живот — свободно или с трудом?', timer: 40 },
      { text: 'Руки, кисти, пальцы. Ладони часто держат тревогу — побудь здесь.', timer: 30 },
      { text: 'Ноги, ступни, пальцы ног. Почувствуй контакт с полом.', note: 'Глубокий вдох — и медленно открой глаза. Ты здесь.', timer: 30 },
    ]
  },
];

const FINISH_ADVICE = {
  better: 'Отлично. Твоё тело умеет успокаиваться — ты только что это доказал(а). Чем чаще практикуешь, тем быстрее работает.',
  same: 'Это нормально. Иногда нужно несколько попыток или другая техника. Попробуй ещё одну.',
  worse: 'Бывает. При сильной тревоге тело иногда сначала сопротивляется. Попробуй 5-4-3-2-1 — или просто дай себе время. Если тревога не проходит долго — это повод поговорить со специалистом.',
};

// ── State ──
let selectedTech = null;
let masterTimeout = null;

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = '';
}

function playBell() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 3.0);
    [528, 1056, 1584].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g2 = ctx.createGain();
      osc.connect(g2); g2.connect(gain);
      osc.type = 'sine'; osc.frequency.value = freq;
      g2.gain.value = i === 0 ? 1 : 0.3 - i * 0.08;
      osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 3.2);
    });
  } catch(e) {}
}

// ── Build pick screen ──
const list = document.getElementById('technique-list');
TECHNIQUES.forEach(tech => {
  const card = document.createElement('div');
  card.className = 'technique-card';
  card.innerHTML = `
    <div class="tc-top">
      <div class="tc-icon">${tech.icon}</div>
      <div class="tc-body">
        <div class="tc-when">${tech.when}</div>
        <div class="tc-name">${tech.name}</div>
        <div class="tc-desc">${tech.desc}</div>
      </div>
    </div>
    <div class="tc-meta">${tech.tags.map(t => `<span class="tc-tag">${t}</span>`).join('')}</div>`;
  card.addEventListener('click', () => {
    selectedTech = tech;
    prepareDoScreen();
    show('screen-do');
  });
  list.appendChild(card);
});

// ── Prepare do screen (before start) ──
function prepareDoScreen() {
  const tech = selectedTech;
  clearAllTimers();

  document.getElementById('do-icon').textContent = tech.icon;
  document.getElementById('do-name').textContent = tech.name;
  document.getElementById('btn-start').style.display = 'block';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('timer-big').style.display = 'none';
  document.getElementById('cycle-row').style.display = 'none';

  // Build step pips
  const bar = document.getElementById('step-bar');
  bar.innerHTML = '';
  tech.steps.forEach((_, i) => {
    const pip = document.createElement('div');
    pip.className = 'step-pip' + (i === 0 ? ' active' : '');
    bar.appendChild(pip);
  });

  // Show first step text
  setStepContent(tech.steps[0], 0, tech.steps.length);
}

function setStepContent(step, idx, total, cyclePhaseLabel) {
  const el = document.getElementById('step-info');
  el.classList.add('fade-out');
  setTimeout(() => {
    document.getElementById('step-eyebrow').textContent = `Шаг ${idx + 1} из ${total}`;
    document.getElementById('step-text').textContent = cyclePhaseLabel || step.text;
    const noteEl = document.getElementById('step-note');
    if (!cyclePhaseLabel && step.note) { noteEl.textContent = step.note; noteEl.style.display = 'block'; }
    else { noteEl.style.display = 'none'; }
    el.classList.remove('fade-out');
  }, 200);
}

function updatePips(stepIdx) {
  document.querySelectorAll('.step-pip').forEach((pip, i) => {
    pip.className = 'step-pip' + (i < stepIdx ? ' done' : i === stepIdx ? ' active' : '');
  });
}

// ── Timer rendering ──
let timerRAF = null;
let timerStart = null;
let timerDuration = 0;
let timerOnDone = null;

function startTimerAnim(duration, onDone) {
  timerDuration = duration;
  timerStart = performance.now();
  timerOnDone = onDone;
  document.getElementById('timer-big').style.display = 'block';

  function tick(now) {
    const elapsed = (now - timerStart) / 1000;
    const left = Math.max(0, duration - elapsed);
    document.getElementById('timer-num').textContent = Math.ceil(left);
    const circ = 2 * Math.PI * 76;
    const progress = elapsed / duration;
    document.getElementById('timer-arc').style.strokeDashoffset = circ * (1 - Math.min(progress, 1));
    if (left > 0) {
      timerRAF = requestAnimationFrame(tick);
    } else {
      timerOnDone && timerOnDone();
    }
  }
  timerRAF = requestAnimationFrame(tick);
}

function stopTimerAnim() {
  if (timerRAF) cancelAnimationFrame(timerRAF);
  timerRAF = null;
}

function clearAllTimers() {
  stopTimerAnim();
  clearTimeout(masterTimeout);
}

// ── Run the full practice sequence ──
function runPractice() {
  const tech = selectedTech;
  const steps = tech.steps;
  document.getElementById('btn-start').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'block';

  let stepIdx = 0;

  function runStep(idx) {
    if (idx >= steps.length) {
      finishPractice();
      return;
    }
    const step = steps[idx];
    stepIdx = idx;
    updatePips(idx);
    setStepContent(step, idx, steps.length);
    document.getElementById('cycle-row').style.display = 'none';

    if (step.cycles) {
      runCycles(step, idx, steps.length, () => runStep(idx + 1));
    } else if (step.timer) {
      startTimerAnim(step.timer, () => {
        playBell();
        masterTimeout = setTimeout(() => runStep(idx + 1), 800);
      });
    } else {
      // no timer, auto-advance after a moment
      masterTimeout = setTimeout(() => runStep(idx + 1), 2000);
    }
  }

  runStep(0);
}

function runCycles(step, stepIdx, totalSteps, onDone) {
  const { count, phases } = step.cycles;
  let cycleNum = 0;
  let phaseIdx = 0;

  // Build cycle dots
  const cycleRow = document.getElementById('cycle-row');
  cycleRow.style.display = 'flex';
  cycleRow.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const dot = document.createElement('div');
    dot.className = 'cycle-dot' + (i === 0 ? ' active' : '');
    cycleRow.appendChild(dot);
  }

  function updateCycleDots(current) {
    document.querySelectorAll('.cycle-dot').forEach((d, i) => {
      d.className = 'cycle-dot' + (i < current ? ' done' : i === current ? ' active' : '');
    });
  }

  function runPhase() {
    if (cycleNum >= count) {
      playBell();
      masterTimeout = setTimeout(onDone, 800);
      return;
    }
    const phase = phases[phaseIdx];
    // Update text to show phase label
    setStepContent(step, stepIdx, totalSteps, phase.label);
    updateCycleDots(cycleNum);

    startTimerAnim(phase.duration, () => {
      phaseIdx++;
      if (phaseIdx >= phases.length) {
        phaseIdx = 0;
        cycleNum++;
      }
      masterTimeout = setTimeout(runPhase, 300);
    });
  }

  runPhase();
}

function finishPractice() {
  clearAllTimers();
  document.getElementById('timer-big').style.display = 'none';
  document.getElementById('cycle-row').style.display = 'none';
  document.getElementById('btn-stop').style.display = 'none';
  document.getElementById('finish-text').textContent =
    `Ты сделал(а) «${selectedTech.name}». Хорошая работа.`;
  document.getElementById('finish-advice').style.display = 'none';
  document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('selected'));
  playBell();
  setTimeout(() => show('screen-finish'), 600);
}

// ── Button handlers ──
document.getElementById('btn-start').addEventListener('click', runPractice);

document.getElementById('btn-stop').addEventListener('click', () => {
  clearAllTimers();
  prepareDoScreen();
});

document.getElementById('btn-back-pick').addEventListener('click', () => {
  clearAllTimers();
  show('screen-pick');
});

document.querySelectorAll('.feeling-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.feeling-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    const advEl = document.getElementById('finish-advice');
    advEl.textContent = FINISH_ADVICE[btn.dataset.v];
    advEl.style.display = 'block';
  });
});

document.getElementById('btn-another').addEventListener('click', () => {
  clearAllTimers();
  show('screen-pick');
});

document.getElementById('btn-repeat').addEventListener('click', () => {
  clearAllTimers();
  prepareDoScreen();
  show('screen-do');
});
</script>
